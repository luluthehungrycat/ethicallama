name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-fno-omit-frame-pointer
  # pyo3 0.20 doesn't detect Python 3.13+ as supported, but it works via
  # the stable ABI (abi3).  Set this env var to bypass the version check.
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  test:
    name: Python ${{ matrix.python-version }} (ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('ethllama-core/Cargo.lock', 'ethllama-core/Cargo.toml', 'ethllama-core/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            libopenblas-dev \
            build-essential \
            pkg-config

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio httpx fastapi uvicorn pydantic

      - name: Build Rust extension and install package
        run: |
          # Build wheel with maturin, then pip-install it.
          # Can't use 'maturin develop' here because there's no virtualenv.
          maturin build --release --out dist
          pip install dist/*.whl

      - name: Run Python tests
        run: pytest ethllama/tests/ -v

      - name: Run Rust tests
        working-directory: ethllama-core
        run: cargo test --lib

  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (stable, with rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('ethllama-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: rustfmt check
        working-directory: ethllama-core
        run: cargo fmt --all -- --check

      - name: clippy check (lib, all targets, -D warnings)
        working-directory: ethllama-core
        run: cargo clippy --lib --all-targets -- -D warnings
