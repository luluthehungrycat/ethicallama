# Nginx reverse proxy for ethicallama
# Place in /etc/nginx/sites-available/ethllama and symlink to sites-enabled

upstream ethllama_backend {
    server 127.0.0.1:10434;
    keepalive 32;
}

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name ethllama.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ethllama.example.com;

    ssl_certificate /etc/letsencrypt/live/ethllama.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ethllama.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Large model artifacts can be big — bump timeouts
    proxy_connect_timeout 600;
    proxy_send_timeout    600;
    proxy_read_timeout    600;
    send_timeout          600;
    client_max_body_size  10G;  # for OpenAI-compatible multipart uploads

    # SSE streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    location / {
        proxy_pass http://ethllama_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
